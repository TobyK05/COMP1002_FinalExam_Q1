<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Page title shown in browser tab -->
  <title>The Hungry Coder</title>

  <!-- Internal CSS (styling for the page) -->
  <style>

    /* Style the whole page */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    /* Header section */
    header {
      background-color: #333;
      color: white;
      padding: 10px;
    }

    /* Navigation list (horizontal menu) */
    nav ul {
      list-style: none; /* remove bullet points */
      display: flex;    /* make items in a row */
      gap: 15px;        /* space between links */
      padding: 0;
    }

    /* Navigation links */
    nav a {
      color: white;
      text-decoration: none; /* remove underline */
    }

    /* Hover effect on links */
    nav a:hover {
      color: orange;
    }

    /* Main content layout (2 columns) */
    .content {
      display: flex;   /* creates two columns */
      gap: 20px;
      padding: 20px;
    }

    /* Footer at bottom */
    footer {
      text-align: center;
      background-color: #333;
      color: white;
      padding: 10px;
    }

  </style>

</head>
<body>

  <!-- Header with restaurant name and navigation -->
  <header>
    <h1>The Hungry Coder</h1>

    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Menu</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main content area -->
  <main>
    <section class="content">

      <!-- Left column -->
      <div>
        <h2>Welcome</h2>
        <p>Welcome to Hungry coder!</p>
      </div>

      <!-- Right column -->
      <div>
        <p>More information about our food and services.</p>
      </div>

    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>© 2026 The Hungry Coder</p>
  </footer>

</body>
</html>
